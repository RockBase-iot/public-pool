# docker-compose-test.yaml
# Optimized for 2-core / 4GB test server
# Usage:
#   cp .env.example pool-test.env   # then edit pool-test.env
#   docker compose -f docker-compose-test.yaml up -d --build

version: '3.8'
services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      POSTGRES_USER: ${DB_USERNAME:-publicpool}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-publicpool}
      POSTGRES_DB: ${DB_DATABASE:-publicpool}
    command:
      - "postgres"
      - "-c" 
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "max_connections=30"
      - "-c"
      - "wal_buffers=4MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-publicpool}"]
      interval: 10s
      timeout: 5s
      retries: 5

  public-pool:
    container_name: public-pool
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    ports:
      - "0.0.0.0:3333:3333/tcp"
      - "0.0.0.0:3334:3334/tcp"
    volumes:
      - "./pool-test.env:/public-pool/.env:ro"
    environment:
      - NODE_ENV=production
      # --- 2-core/4GB tuning ---
      - NODE_HEAP_MB=512
      - PM2_MAX_MEMORY=800M
      - PM2_WORKERS=1
      # --- DB connection (override .env if needed) ---
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-publicpool}
      - DB_PASSWORD=${DB_PASSWORD:-publicpool}
      - DB_DATABASE=${DB_DATABASE:-publicpool}
      - MASTER=true
      - STRATUM_PORTS=3333
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

volumes:
  postgres-data:
