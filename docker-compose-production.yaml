version: '3.8'
services:
  traefik:
    image: "traefik:latest"
    container_name: "traefik"
    restart: unless-stopped
    command:
      - "--accesslog=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.selfhostedservices.acme.tlschallenge=true"
      - "--certificatesresolvers.selfhostedservices.acme.email=912097713@qq.com"
      - "--certificatesresolvers.selfhostedservices.acme.storage=/letsencrypt/acme.json"
      - "--serversTransport.insecureSkipVerify=true"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - "lets-encrypt-data:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  bitcoind:
    image: ghcr.io/sethforprivacy/bitcoind:latest
    restart: unless-stopped
    container_name: bitcoind
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
    volumes:
      - bitcoind-data:/bitcoin/.bitcoin
      - ./bitcoin.conf:/bitcoin/.bitcoin/bitcoin.conf
    ports:
      - 8333:8333

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    environment:
      POSTGRES_USER: ${DB_USERNAME:-publicpool}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-publicpool}
      POSTGRES_DB: ${DB_DATABASE:-publicpool}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "max_connections=200"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-publicpool}"]
      interval: 10s
      timeout: 5s
      retries: 5

  public-pool:
    container_name: public-pool
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${POOL_CPUS:-5.0}'
          memory: ${POOL_MEMORY:-10G}
    ports:
      - "0.0.0.0:3333:3333/tcp"
    volumes:
      - "./pool.env:/public-pool/.env:ro"
    environment:
      - NODE_ENV=production
      - NODE_HEAP_MB=${NODE_HEAP_MB:-2048}
      - PM2_MAX_MEMORY=${PM2_MAX_MEMORY:-2500M}
      - PM2_WORKERS=${PM2_WORKERS:-4}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-publicpool}
      - DB_PASSWORD=${DB_PASSWORD:-publicpool}
      - DB_DATABASE=${DB_DATABASE:-publicpool}
      - MASTER=true
      - STRATUM_PORTS=3333
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    sysctls:
      - net.core.somaxconn=65535
      - net.ipv4.tcp_max_syn_backlog=65535
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.public-pool-api.rule=Host(`solobtc.nmminer.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.public-pool-api.tls.certresolver=selfhostedservices"
      - "traefik.http.routers.public-pool-api.entrypoints=websecure"
      - "traefik.http.services.public-pool-api.loadbalancer.server.port=3334"

  public-pool-ui:
    container_name: public-pool-ui
    build: ./public-pool-ui
    restart: unless-stopped
    environment:
      - DOMAIN=solobtc.nmminer.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.public-pool-ui.rule=Host(`solobtc.nmminer.com`)"
      - "traefik.http.routers.public-pool-ui.tls.certresolver=selfhostedservices"
      - "traefik.http.routers.public-pool-ui.entrypoints=websecure"
      - "traefik.http.services.public-pool-ui.loadbalancer.server.port=80"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

volumes:
    lets-encrypt-data:
    bitcoind-data:
    postgres-data:
